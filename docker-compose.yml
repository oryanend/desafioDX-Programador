services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "desafiodx"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: dev

    depends_on:
      - postgres

    restart: unless-stopped

volumes:
  postgres_data: