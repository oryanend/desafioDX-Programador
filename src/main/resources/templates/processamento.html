<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Processamento de Dados</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/telas}">
            Sistema de Escalação
        </a>

        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/telas/integrantes}">
                Integrantes
            </a>

            <a class="nav-link" th:href="@{/telas/times}">
                Times
            </a>

            <a class="nav-link active" th:href="@{/telas/processamento}">
                Processamento
            </a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm mb-4">
        <div class="card-header">
            Consultas
        </div>

        <div class="card-body">
            <form th:action="@{/telas/processamento/buscar}"
                  method="get">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">
                            Consulta
                        </label>

                        <select class="form-select"
                                name="funcao">

                            <option value="timeDaData">
                                Time da Data
                            </option>

                            <option value="integranteMaisUsado">
                                Integrante Mais Usado
                            </option>

                            <option value="integrantesTimeMaisRecorrente">
                                Integrantes do Time Mais Recorrente
                            </option>

                            <option value="funcaoMaisRecorrente">
                                Função Mais Recorrente
                            </option>

                            <option value="clubeMaisRecorrente">
                                Clube Mais Recorrente
                            </option>

                            <option value="contagemClubes">
                                Contagem de Clubes
                            </option>

                            <option value="contagemFuncoes">
                                Contagem por Função
                            </option>

                        </select>
                    </div>

                    <!-- utilizado apenas para TimeDaData -->
                    <div class="col-md-2">
                        <label class="form-label">
                            Data
                        </label>

                        <input type="date"
                               name="data"
                               class="form-control">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">
                            Data Inicial
                        </label>

                        <input type="date"
                               name="dataInicial"
                               class="form-control">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">
                            Data Final
                        </label>

                        <input type="date"
                               name="dataFinal"
                               class="form-control">
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit"
                                class="btn btn-success w-100">
                            Buscar
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${resultado != null}"
         class="card shadow-sm">

        <div class="card-header fw-bold"
             th:text="${resultado.titulo}">
        </div>

        <div class="card-body">
            <div th:if="${resultado.dados != null}">
                <pre class="mb-0"
                     th:text="${resultado.dados}">
                </pre>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
