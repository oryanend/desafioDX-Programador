<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Integrantes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/telas/integrantes">Sistema de Escalação</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="/telas/integrantes">Integrantes</a>
            <a class="nav-link" href="/telas/times">Times</a>
            <a class="nav-link" href="/telas/processamento">Processamento</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card mb-4">
        <div class="card-header">
            Cadastro de Integrante
        </div>

        <div class="card-body">
            <form th:action="@{/telas/integrantes}"
                  th:object="${novoIntegrante}"
                  method="post">

                <div class="row">
                    <div class="col-md-6">
                        <input class="form-control"
                               th:field="*{nome}"
                               placeholder="Nome"
                               required>
                    </div>

                    <div class="col-md-4">
                        <input class="form-control"
                               th:field="*{funcao}"
                               placeholder="Função"
                               required>
                    </div>

                    <div class="col-md-2">
                        <button class="btn btn-primary w-100">
                            Salvar
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            Integrantes Cadastrados
        </div>

        <div class="card-body">
            <table class="table table-striped table-hover">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Função</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="integrante : ${integrantes}">
                    <td th:text="${integrante.id}"></td>
                    <td th:text="${integrante.nome}"></td>
                    <td th:text="${integrante.funcao}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
