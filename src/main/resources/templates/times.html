<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Times</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/telas/integrantes">
            Sistema de Escalação
        </a>

        <div class="navbar-nav">
            <a class="nav-link" href="/telas/integrantes">Integrantes</a>
            <a class="nav-link active" href="/telas/times">Times</a>
            <a class="nav-link" href="/telas/processamento">Processamento</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card mb-4">
        <div class="card-header">
            Montagem de Time
        </div>

        <div class="card-body">
            <form th:action="@{/telas/times}" method="post">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Nome do Clube</label>

                        <input
                                type="text"
                                name="nomeClube"
                                class="form-control"
                                placeholder="Ex: Santos FC"
                                required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Data</label>

                        <input
                                type="date"
                                name="data"
                                class="form-control"
                                required>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        Selecione os Integrantes
                    </div>

                    <div class="card-body">
                        <div th:each="integrante : ${integrantes}"
                             class="form-check mb-2">
                            <input
                                    class="form-check-input"
                                    type="checkbox"
                                    name="integranteIds"
                                    th:value="${integrante.id}">
                            <label
                                    class="form-check-label"
                                    th:text="${integrante.nome + ' - ' + integrante.funcao}">
                            </label>
                        </div>
                    </div>
                </div>

                <div class="mt-3">
                    <button class="btn btn-primary">
                        Salvar Time
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            Times Cadastrados
        </div>

        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Clube</th>
                    <th>Data</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="time : ${times}">
                    <td th:text="${time.id}"></td>
                    <td th:text="${time.nomeDoClube}"></td>
                    <td th:text="${time.data}"></td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
